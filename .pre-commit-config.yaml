repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.12.2"
    hooks:
      - id: ruff
        args: ["--fix", "--show-fixes", "--output-format=full"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: "v1.17.0"
    hooks:
      - id: mypy
        additional_dependencies: []
        args: ["--ignore-missing-imports"]

  - repo: local
    hooks:
      - id: check-license
        name: Check license headers
        entry: python3 scripts/check_license.py --directories .
        language: python
        pass_filenames: false

      - id: check-no-bytedance-copyright
        name: Check copyright headers (Bytedance or BAAI)
        entry: python3 scripts/check_bytedance_copyright.py --directories .
        language: python
        pass_filenames: false

      - id: check-naming-conventions
        name: Check naming conventions
        entry: sh -c 'fail=0; if grep -rIn --exclude-dir=.git --exclude-dir=venv --exclude-dir=__pycache__ --exclude-dir=.github --exclude=.pre-commit-config.yaml "veRL" .; then echo "Please use verl instead of veRL"; fail=1; fi; exit $fail'
        language: system
        pass_filenames: false

      - id: compileall
        name: Compile all python files
        entry: sh -c 'PYTHONWARNINGS=error python3 -m compileall -q . -x "(^|[\\/])(\.venv|venv|\.git)([\\/]|$)"'
        language: python
        pass_filenames: false
