name: Format & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check . --output-format=full

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy --ignore-missing-imports verl_hardware_plugin/

      - name: Check license headers
        run: python scripts/check_license.py --directories .

      - name: Check copyright headers
        run: python scripts/check_bytedance_copyright.py --directories .

      - name: Check naming conventions
        run: |
          if grep -rIn --exclude-dir=.git --exclude-dir=venv --exclude-dir=__pycache__ --exclude=.pre-commit-config.yaml --exclude-dir=.github "veRL" .; then
            echo "Please use 'verl' instead of 'veRL'"
            exit 1
          fi

      - name: Compile all python files
        run: PYTHONWARNINGS=error python -m compileall -q . -x "(^|[\\/])(\.venv|venv|\.git)([\\/]|$)"
